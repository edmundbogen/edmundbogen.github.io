<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Central Command</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Central Command">
<meta name="theme-color" content="#0b1f2a">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<style>
  :root { --navy:#0b1f2a; --cyan:#00c2ff; --gold:#c9a24b; }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body {
    font-family:-apple-system,'Montserrat',Helvetica,Arial,sans-serif;
    background:var(--navy); color:#fff; min-height:100vh;
    padding:env(safe-area-inset-top) 18px env(safe-area-inset-bottom);
    display:flex; flex-direction:column;
  }
  header { padding:22px 0 14px; text-align:center; }
  .brand { font-size:13px; letter-spacing:0.18em; text-transform:uppercase; color:var(--cyan); font-weight:600; }
  h1 { font-size:22px; font-weight:300; letter-spacing:0.04em; margin-top:6px; }
  h1 b { font-weight:600; }
  .hint { font-size:13px; color:rgba(255,255,255,0.55); margin-top:8px; line-height:1.5; }
  textarea {
    width:100%; flex:0 0 auto; min-height:170px; margin-top:18px; padding:18px;
    font-family:inherit; font-size:18px; line-height:1.5; color:#fff;
    background:rgba(255,255,255,0.07); border:2px solid rgba(255,255,255,0.15);
    border-radius:16px; resize:none; outline:none;
  }
  textarea:focus { border-color:var(--cyan); }
  textarea::placeholder { color:rgba(255,255,255,0.35); }
  .save {
    width:100%; margin-top:14px; padding:18px; border:none; border-radius:16px;
    background:var(--cyan); color:#052430; font-family:inherit; font-size:17px; font-weight:700;
    letter-spacing:0.04em; cursor:pointer;
  }
  .save:active { background:#00a6db; }
  .save:disabled { opacity:0.5; }
  .route { width:100%; margin-top:10px; padding:16px; border:1px solid var(--gold); border-radius:16px; background:rgba(201,162,75,0.12); color:var(--gold); font-family:inherit; font-size:16px; font-weight:700; letter-spacing:0.03em; cursor:pointer; }
  .route:active { background:rgba(201,162,75,0.25); }
  .route:disabled { opacity:0.5; }
  .routecard { margin-top:14px; background:rgba(255,255,255,0.06); border:1px solid rgba(201,162,75,0.45); border-radius:14px; padding:16px; }
  .routecard h3 { font-size:12px; letter-spacing:0.1em; text-transform:uppercase; color:var(--gold); margin-bottom:8px; }
  .routecard .kv { font-size:14px; line-height:1.6; }
  .routecard .kv b { color:#fff; }
  .routecard .match { display:block; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.15); border-radius:10px; padding:10px 12px; margin:6px 0; font-size:14px; cursor:pointer; }
  .routecard .match input { margin-right:8px; }
  .routecard .addr { color:rgba(255,255,255,0.5); font-size:12px; margin-left:22px; }
  .routecard .btns { display:flex; gap:10px; margin-top:14px; }
  .routecard .btns button { flex:1; padding:14px; border:none; border-radius:12px; font-family:inherit; font-size:15px; font-weight:700; cursor:pointer; }
  .confirmb { background:var(--gold); color:#221800; }
  .cancelb { background:rgba(255,255,255,0.12); color:#fff; }
  .routecard .done { font-size:14px; line-height:1.7; }
  .routecard .done a { color:var(--cyan); }
  .emfield { width:100%; margin-top:4px; padding:10px 12px; font-family:inherit; font-size:14px; color:#fff; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.2); border-radius:8px; outline:none; }
  .emfield:focus { border-color:var(--gold); }
  textarea.emfield { resize:vertical; line-height:1.5; }
  .toast { text-align:center; font-size:14px; color:var(--cyan); height:20px; margin-top:12px; opacity:0; transition:opacity .2s; }
  .toast.show { opacity:1; }
  .today { margin-top:26px; flex:1 1 auto; overflow-y:auto; padding-bottom:20px; }
  .today h2 { font-size:12px; letter-spacing:0.12em; text-transform:uppercase; color:rgba(255,255,255,0.5); margin-bottom:12px; }
  .dayrow { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:12px; }
  .dayrow h2 { margin-bottom:0; }
  select.day { font-family:inherit; font-size:13px; font-weight:500; color:#fff; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.25); border-radius:8px; padding:7px 12px; outline:none; -webkit-appearance:none; }
  .entry {
    background:rgba(255,255,255,0.06); border-left:3px solid var(--cyan);
    border-radius:8px; padding:12px 14px; margin-bottom:10px; font-size:15px; line-height:1.5;
  }
  .entry { position:relative; padding-right:38px; }
  .entry .t { display:block; font-size:11px; color:rgba(255,255,255,0.4); margin-bottom:4px; }
  .del { position:absolute; top:8px; right:8px; width:26px; height:26px; border:none; border-radius:8px; background:rgba(255,255,255,0.08); color:rgba(255,255,255,0.5); font-size:16px; line-height:1; cursor:pointer; }
  .del:active { background:rgba(255,80,80,0.35); color:#fff; }
  .empty { font-size:14px; color:rgba(255,255,255,0.4); font-style:italic; }
  .syncnow { width:100%; margin-top:24px; padding:13px; border:1px solid rgba(0,194,255,0.5); border-radius:12px; background:rgba(0,194,255,0.12); color:var(--cyan); font-family:inherit; font-size:14px; font-weight:600; cursor:pointer; }
  .syncnow:active { background:rgba(0,194,255,0.22); }
  .syncnow:disabled { opacity:0.5; }
  .digest { margin-top:30px; }
  .digest h2 { font-size:12px; letter-spacing:0.12em; text-transform:uppercase; color:var(--gold); margin-bottom:12px; }
  .digest-card { background:rgba(201,162,75,0.08); border:1px solid rgba(201,162,75,0.28); border-radius:12px; padding:16px 18px; font-size:15px; line-height:1.6; }
  .digest-card h3 { font-size:13px; letter-spacing:0.08em; text-transform:uppercase; color:var(--gold); margin:14px 0 6px; }
  .digest-card h3:first-child { margin-top:0; }
  .digest-card strong { color:#fff; }
  .digest-card ul { margin:4px 0 4px 18px; }
  .digest-card li { margin-bottom:4px; }
  .digest-card .meta { color:rgba(255,255,255,0.4); font-size:11px; margin-top:14px; }
  footer { text-align:center; font-size:11px; color:rgba(255,255,255,0.3); padding:10px 0; letter-spacing:0.06em; }
</style>
</head>
<body>
  <header>
    <div class="brand">Bogen.ai</div>
    <h1>Central <b>Command</b></h1>
    <div class="hint">Dictate anything — a task, a note, who you called, what's on your mind. Tap Save. It gets sorted by vertical and turned into your brief.</div>
  </header>

  <textarea id="thought" placeholder="Dictate or type…" autocomplete="off"></textarea>
  <button class="save" id="saveBtn">Save</button>
  <button class="route" id="routeBtn">⚡ Route to CRM</button>
  <div class="toast" id="toast"></div>
  <div id="routeCard" class="routecard" style="display:none"></div>

  <div class="today">
    <div class="dayrow">
      <h2>Captures (<span id="count">0</span>)</h2>
      <select class="day" id="daySel"></select>
    </div>
    <div id="list"><div class="empty">Loading…</div></div>
  </div>

  <button class="syncnow" id="syncBtn">⚡ Build my brief for this day</button>
  <button class="syncnow" id="emailBriefBtn">📧 Email me this brief</button>
  <div class="toast" id="syncToast"></div>

  <div class="digest" id="digestWrap" style="display:none">
    <h2 id="digestTitle">Daily Brief</h2>
    <div class="digest-card" id="digestCard"></div>
  </div>

  <footer>Bogen.ai &nbsp;·&nbsp; Central Command</footer>

<script>
  var URL = "https://fvtltzxnjnpudkslyqzd.supabase.co/rest/v1/thought_captures";
  var KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ2dGx0enhuam5wdWRrc2x5cXpkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxOTczMzMsImV4cCI6MjA5Mzc3MzMzM30.EXmU94QsTkB5jBqPV5oZ3gsBxLxVV-D17PqNXaqhONY";
  var OWNER = "edmund";
  var SYNTH = "https://fvtltzxnjnpudkslyqzd.supabase.co/functions/v1/command-synthesize";
  var DIGEST_URL = "https://fvtltzxnjnpudkslyqzd.supabase.co/rest/v1/thought_digests";
  var H = { "apikey":KEY, "Authorization":"Bearer "+KEY, "Content-Type":"application/json" };

  var ta = document.getElementById("thought");
  var btn = document.getElementById("saveBtn");
  var toast = document.getElementById("toast");

  function flash(msg){ toast.textContent=msg; toast.classList.add("show"); setTimeout(function(){toast.classList.remove("show");},2200); }

  function today(){
    var d = new Date(); // device-local; ET assumed for Boca Raton
    return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
  }

  function save(){
    var body = ta.value.trim();
    if(!body) return;
    btn.disabled = true; btn.textContent = "Saving…";
    fetch(URL, { method:"POST", headers:Object.assign({"Prefer":"return=minimal"},H),
      body: JSON.stringify({ owner:OWNER, body:body }) })
    .then(function(r){
      if(!r.ok) throw new Error(r.status);
      ta.value=""; flash("Saved ✓"); selectedDate=today(); buildDays(); refresh();
    })
    .catch(function(e){ flash("Couldn't save — try again"); })
    .finally(function(){ btn.disabled=false; btn.textContent="Save"; });
  }

  var selectedDate = today();

  function fmtLabel(d){
    if(d===today()) return "Today";
    var dt = new Date(d+"T12:00:00");
    return dt.toLocaleDateString([], {weekday:"short", month:"short", day:"numeric"});
  }

  function buildDays(){
    var q = URL+"?owner=eq."+OWNER+"&select=captured_date&order=captured_date.desc";
    fetch(q,{headers:H}).then(function(r){return r.json();}).then(function(rows){
      var seen={}, dates=[];
      (rows||[]).forEach(function(r){ if(!seen[r.captured_date]){seen[r.captured_date]=1; dates.push(r.captured_date);} });
      if(dates.indexOf(today())<0) dates.unshift(today());
      if(dates.indexOf(selectedDate)<0) selectedDate=today();
      var sel=document.getElementById("daySel");
      sel.innerHTML = dates.map(function(d){ return '<option value="'+d+'"'+(d===selectedDate?' selected':'')+'>'+fmtLabel(d)+'</option>'; }).join("");
      sel.onchange=function(){ selectedDate=sel.value; refresh(); };
    }).catch(function(){});
  }

  function refresh(){ load(); loadDigest(); }

  function load(){
    var q = URL+"?owner=eq."+OWNER+"&captured_date=eq."+selectedDate+"&order=created_at.desc";
    fetch(q, { headers:H }).then(function(r){return r.json();}).then(function(rows){
      var list = document.getElementById("list");
      document.getElementById("count").textContent = rows.length;
      if(!rows.length){ list.innerHTML = '<div class="empty">'+(selectedDate===today()?"Nothing yet today. Dictate your first item above.":"Nothing captured on this day.")+'</div>'; return; }
      list.innerHTML = rows.map(function(row){
        var t = new Date(row.created_at).toLocaleTimeString([], {hour:"numeric",minute:"2-digit"});
        var safe = row.body.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
        return '<div class="entry"><button class="del" onclick="delCap(\''+row.id+'\')">&times;</button><span class="t">'+t+'</span>'+safe+'</div>';
      }).join("");
    }).catch(function(){ document.getElementById("list").innerHTML='<div class="empty">Couldn\'t load the list.</div>'; });
  }

  function mdLite(md){
    var safe = md.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    var lines = safe.split("\n"), out = [], inList = false;
    for(var i=0;i<lines.length;i++){
      var l = lines[i];
      var h = l.match(/^#{1,3}\s+(.*)/);
      if(h){ if(inList){out.push("</ul>");inList=false;} out.push("<h3>"+h[1]+"</h3>"); continue; }
      var b = l.match(/^[-*]\s+(.*)/);
      if(b){ if(!inList){out.push("<ul>");inList=true;} out.push("<li>"+b[1]+"</li>"); continue; }
      if(inList){out.push("</ul>");inList=false;}
      if(l.trim()) out.push("<p style='margin:6px 0'>"+l+"</p>");
    }
    if(inList) out.push("</ul>");
    return out.join("").replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>");
  }

  function loadDigest(){
    var wrap = document.getElementById("digestWrap");
    var q = DIGEST_URL+"?owner=eq."+OWNER+"&digest_date=eq."+selectedDate+"&select=body_md,source_count&limit=1";
    fetch(q, { headers:H }).then(function(r){return r.json();}).then(function(rows){
      if(rows && rows.length){
        document.getElementById("digestTitle").textContent = (selectedDate===today()?"Today's ":fmtLabel(selectedDate)+" — ")+"Brief";
        document.getElementById("digestCard").innerHTML = mdLite(rows[0].body_md) +
          '<div class="meta">'+rows[0].source_count+' items synthesized</div>';
        wrap.style.display = "block";
      } else { wrap.style.display = "none"; }
    }).catch(function(){ wrap.style.display = "none"; });
  }

  var syncBtn = document.getElementById("syncBtn");
  var syncToast = document.getElementById("syncToast");
  function syncNow(){
    syncBtn.disabled = true; syncBtn.textContent = "Building…";
    fetch(SYNTH, {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ date: selectedDate })
    }).then(function(r){return r.json();}).then(function(res){
      if(res && res.ok){ syncToast.textContent="Done ✓ "+res.captures+" items synthesized"; loadDigest(); buildDays(); }
      else if(res && res.skipped){ syncToast.textContent="Nothing new to synthesize for this day"; }
      else { syncToast.textContent="Couldn't build — try again"; }
      syncToast.classList.add("show"); setTimeout(function(){syncToast.classList.remove("show");},3500);
    }).catch(function(){ syncToast.textContent="Couldn't build — try again"; syncToast.classList.add("show"); setTimeout(function(){syncToast.classList.remove("show");},3500); })
    .finally(function(){ syncBtn.disabled=false; syncBtn.textContent="⚡ Build my brief for this day"; });
  }

  window.delCap = function(id){
    if(!confirm("Delete this capture?")) return;
    fetch(URL+"?id=eq."+id+"&owner=eq."+OWNER, { method:"DELETE", headers:Object.assign({"Prefer":"return=minimal"},H) })
    .then(function(r){ if(!r.ok) throw new Error(r.status); refresh(); buildDays(); })
    .catch(function(){ flash("Couldn't delete — try again"); });
  };

  // ---- Route to CRM (propose -> confirm -> execute) ----
  var ROUTE = "https://fvtltzxnjnpudkslyqzd.supabase.co/functions/v1/command-route";
  var routeBtn = document.getElementById("routeBtn");
  var routeCard = document.getElementById("routeCard");
  var pending = null;
  function esc(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

  function routePropose(){
    var text = ta.value.trim();
    if(!text){ flash("Dictate a command first"); return; }
    routeBtn.disabled=true; routeBtn.textContent="Reading…"; routeCard.style.display="none";
    fetch(ROUTE,{ method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({mode:"propose",text:text}) })
    .then(function(r){return r.json();}).then(function(res){
      if(res.error){ flash("Error: "+res.error); return; }
      if(!res.proposal || res.proposal.kind==="unknown"){
        routeCard.innerHTML='<div class="kv">That didn\'t look like a CRM command. Try: "Log a call with Stuart Benson…" or "Add a new contact…"</div><div class="btns"><button class="cancelb" onclick="closeRoute()">OK</button></div>';
        routeCard.style.display="block"; return;
      }
      pending = res; renderProposal(res);
    }).catch(function(){ flash("Couldn't reach CRM"); })
    .finally(function(){ routeBtn.disabled=false; routeBtn.textContent="⚡ Route to CRM"; });
  }

  window.renderProposal = function(res){
    var p = res.proposal;
    if(p.kind==="add_task"){
      var t = '<h3>New task / reminder</h3>';
      t += '<div class="kv"><b>In:</b> Notion Tasks</div>';
      t += '<div class="kv" style="margin-top:8px"><b>Task:</b></div><input id="tkName" class="emfield" value="'+esc(p.task||"")+'">';
      t += '<div class="kv" style="margin-top:8px"><b>Due:</b></div><input id="tkDue" class="emfield" type="date" value="'+esc(p.due||"")+'">';
      t += '<div class="kv" style="margin-top:8px"><b>Priority:</b></div><select id="tkPri" class="emfield">'
        + '<option'+(p.priority==="High"?" selected":"")+'>High</option>'
        + '<option'+((!p.priority||p.priority==="Medium")?" selected":"")+'>Medium</option>'
        + '<option'+(p.priority==="Low"?" selected":"")+'>Low</option></select>';
      t += '<div class="btns"><button class="cancelb" onclick="closeRoute()">Cancel</button><button class="confirmb" onclick="routeExecute()">Create Task</button></div>';
      routeCard.innerHTML=t; routeCard.style.display="block";
      return;
    }
    if(p.kind==="draft_email"){
      var to = p.email || (res.matches && res.matches.length ? res.matches[0].email : "");
      var e = '<h3>Draft email</h3>';
      e += '<div class="kv"><b>In:</b> Gmail drafts · edmund@bogenhomes.com</div>';
      if(res.matches && res.matches.length){
        e += '<div class="kv" style="margin-top:6px"><b>Recipient — tap one:</b></div>';
        res.matches.forEach(function(m){ e += '<label class="match"><input type="radio" name="topick" value="'+esc(m.email)+'"'+(m.email===to?' checked':'')+'>'+esc(m.title)+'<div class="addr">'+esc(m.email)+'</div></label>'; });
        e += '<label class="match"><input type="radio" name="topick" value="__blank__">✎ None of these — I’ll type the address below</label>';
      }
      e += '<div class="kv" style="margin-top:8px"><b>To:</b></div><input id="emTo" class="emfield" value="'+esc(to)+'" placeholder="recipient@email.com">';
      e += '<div class="kv" style="margin-top:8px"><b>Subject:</b></div><input id="emSub" class="emfield" value="'+esc(p.subject||"")+'">';
      e += '<div class="kv" style="margin-top:8px"><b>Body:</b></div><textarea id="emBody" class="emfield" style="min-height:150px">'+esc(p.emailBody||"")+'</textarea>';
      e += '<div class="btns"><button class="cancelb" onclick="closeRoute()">Cancel</button><button class="confirmb" onclick="routeExecute()">Create Draft</button></div>';
      routeCard.innerHTML=e; routeCard.style.display="block";
      routeCard.querySelectorAll('input[name=topick]').forEach(function(rb){ rb.addEventListener('change',function(){ var f=document.getElementById('emTo'); if(rb.value==='__blank__'){ f.value=''; f.focus(); } else { f.value=rb.value; } }); });
      return;
    }
    var h = '<h3>'+(p.kind==="create_contact"?"Create contact":"Log to contact")+'</h3>';
    h += '<div class="kv"><b>Database:</b> '+esc(res.db_label)+'</div>';
    h += '<div class="kv"><b>Name:</b> '+esc(p.name)+'</div>';
    if(p.email) h += '<div class="kv"><b>Email:</b> '+esc(p.email)+'</div>';
    if(p.phone) h += '<div class="kv"><b>Phone:</b> '+esc(p.phone)+'</div>';
    if(p.note) h += '<div class="kv"><b>Note:</b> '+esc(p.note)+'</div>';
    if(p.kind==="log_touch"){
      if(!res.matches || !res.matches.length){
        h += '<div class="kv" style="color:#f2a">No match for that name. Cancel and check the spelling, or say "add a new contact" instead.</div>';
        h += '<div class="btns"><button class="cancelb" onclick="closeRoute()">Cancel</button></div>';
        routeCard.innerHTML=h; routeCard.style.display="block"; return;
      }
      h += '<div class="kv" style="margin-top:8px"><b>Which person? Tap the right one:</b></div>';
      res.matches.forEach(function(m){
        h += '<label class="match"><input type="radio" name="match" value="'+m.id+'">'+esc(m.title)+(m.address?'<div class="addr">'+esc(m.address)+'</div>':'')+'</label>';
      });
    }
    h += '<div class="btns"><button class="cancelb" onclick="closeRoute()">Cancel</button><button class="confirmb" onclick="routeExecute()">Confirm &amp; Write</button></div>';
    routeCard.innerHTML=h; routeCard.style.display="block";
  };

  window.closeRoute = function(){ routeCard.style.display="none"; pending=null; };

  window.routeExecute = function(){
    if(!pending) return;
    var p = pending.proposal;
    var action;
    if(p.kind==="add_task"){
      var tkN=(document.getElementById("tkName")||{}).value || "";
      if(!tkN.trim()){ alert("Add a task description."); return; }
      action = { kind:"add_task", task:tkN.trim(), due:(document.getElementById("tkDue")||{}).value||"", priority:(document.getElementById("tkPri")||{}).value||"Medium" };
    } else if(p.kind==="draft_email"){
      var toV = (document.getElementById("emTo")||{}).value || "";
      if(!toV.trim()){ alert("Add a recipient email address."); return; }
      action = { kind:"draft_email", to:toV.trim(), subject:(document.getElementById("emSub")||{}).value||"", body:(document.getElementById("emBody")||{}).value||"" };
    } else {
      action = { kind:p.kind, database:p.database, name:p.name, email:p.email, phone:p.phone, note:p.note };
      if(p.kind==="log_touch"){
        var sel = document.querySelector('input[name=match]:checked');
        if(!sel){ alert("Pick which person this is first."); return; }
        action.page_id = sel.value;
      }
    }
    var cb = routeCard.querySelector(".confirmb");
    var lbl = cb ? cb.textContent : "";
    if(cb){ cb.disabled=true; cb.textContent="Working…"; }
    fetch(ROUTE,{ method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({mode:"execute",action:action}) })
    .then(function(r){return r.json();}).then(function(res){
      if(res.ok){
        var verb = res.action==="created"?"Contact created":(res.action==="drafted"?"Draft created":(res.action==="tasked"?"Task created":"Logged"));
        var link = res.action==="drafted"
          ? '<a href="'+res.url+'" target="_blank">Open Gmail drafts →</a>'
          : '<a href="'+res.url+'" target="_blank">Open in Notion →</a>';
        routeCard.innerHTML='<h3>Done ✓</h3><div class="done">'+verb+' in '+esc(res.db)+'.<br>'+link+'</div><div class="btns"><button class="cancelb" onclick="closeRoute()">Close</button></div>';
        ta.value=""; pending=null;
      } else {
        alert("Failed: "+(res.error||"unknown"));
        if(cb){ cb.disabled=false; cb.textContent=lbl; }
      }
    }).catch(function(){ alert("Failed — try again"); if(cb){ cb.disabled=false; cb.textContent=lbl; } });
  };

  routeBtn.addEventListener("click", routePropose);

  var emailBriefBtn = document.getElementById("emailBriefBtn");
  function emailBrief(){
    emailBriefBtn.disabled=true; emailBriefBtn.textContent="Emailing…";
    fetch(SYNTH,{ method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({date:selectedDate, email:true}) })
    .then(function(r){return r.json();}).then(function(res){
      if(res && res.ok && res.emailed){ syncToast.textContent="Emailed to your inbox ✓"; loadDigest(); }
      else if(res && res.skipped){ syncToast.textContent="Nothing to email for this day"; }
      else if(res && res.ok){ syncToast.textContent="Built, but email failed — try again"; }
      else { syncToast.textContent="Couldn't email — try again"; }
      syncToast.classList.add("show"); setTimeout(function(){syncToast.classList.remove("show");},3500);
    }).catch(function(){ syncToast.textContent="Couldn't email — try again"; syncToast.classList.add("show"); setTimeout(function(){syncToast.classList.remove("show");},3500); })
    .finally(function(){ emailBriefBtn.disabled=false; emailBriefBtn.textContent="📧 Email me this brief"; });
  }
  emailBriefBtn.addEventListener("click", emailBrief);

  btn.addEventListener("click", save);
  syncBtn.addEventListener("click", syncNow);
  buildDays();
  refresh();
</script>
</body>
</html>
